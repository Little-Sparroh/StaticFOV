[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "StaticFOV"
description = "Toggle aim FOV zoom and all additive FOV punches (sprint, melee, dash, etc.) independently."
websiteUrl = "https://github.com/Little-Sparroh/StaticFOV"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"

[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/net48/StaticFOV.dll"
target = "BepInEx/plugins/StaticFOV.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]
