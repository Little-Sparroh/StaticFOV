[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "FOVToggles"
description = "Toggle aim and sprint FOV changes on or off independently."
websiteUrl = "https://github.com/Little-Sparroh/FOVToggles"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"

[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/net48/FOVToggles.dll"
target = "BepInEx/plugins/FOVToggles.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]
